name: my workflow

on:
    push:
        branches: [master]

    pull_request:
        branches: [master]

    workflow_dispatch: 

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - name: print step name 
              run: echo "this is build step"

    test:
        runs-on: ubuntu-latest
        steps: 
            -   name: print step name 
                run: |
                    echo "this is test step"
    deploy:
        runs-on: ubuntu-latest
        steps:
            -   name: print step name 
                run: echo " this is deploy step"